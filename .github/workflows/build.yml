name: Android Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            NAME="TodoNotifications-${TAG}.apk"
          else
            NAME="TodoNotifications.apk"
          fi
          mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/${NAME}"
          echo "APK_NAME=${NAME}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoNotifications
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}
          retention-days: 14

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/${{ env.APK_NAME }}
